server:
  port: 8092

spring:
  application:
    name: hotel-api
  profiles:
    active: h2

  datasource:
    url: jdbc:h2:mem:hoteldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true

  liquibase:
    change-log: classpath:/db/changelog/db-changelog.yaml

springdoc:
  swagger-ui:
    path: /property-view/swagger-ui.html